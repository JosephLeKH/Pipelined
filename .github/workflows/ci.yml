# CI pipeline for Pipelined
# Runs lint, type-check, and tests on every pull_request to main.
#
# Branch protection: require all three jobs (backend, frontend, extension) to pass
# before a PR can be merged. Configure in GitHub -> Settings -> Branches -> main ->
# "Require status checks to pass before merging" and add:
#   - backend
#   - frontend
#   - extension

name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.TEST_MONGO_URI }}
        run: pytest tests/

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  extension:
    name: extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Run tests
        working-directory: extension
        run: npm test
