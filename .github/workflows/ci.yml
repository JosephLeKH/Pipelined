# CI pipeline for Pipelined
# Runs on every push to main and every pull request targeting main.
#
# Backend tests live in their own workflow (.github/workflows/backend-tests.yml)
# to avoid double-spending the Docker Hub unauthenticated rate limit on the
# mongo image.
#
# Recommended branch protection (Settings -> Branches -> main ->
# "Require status checks to pass before merging"):
#   - frontend
#   - extension

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-frontend-npm-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (if eslint configured)
        working-directory: frontend
        run: |
          if [ -f ".eslintrc*" ] || [ -f "eslint.config*" ]; then
            npx eslint src/ --max-warnings=0
          else
            echo "ESLint not configured, skipping lint step"
          fi

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test
        working-directory: frontend
        run: npm test -- --reporter=verbose

  extension:
    name: extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: extension/node_modules
          key: ${{ runner.os }}-extension-npm-${{ hashFiles('extension/package-lock.json') }}
          restore-keys: ${{ runner.os }}-extension-npm-

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Run tests
        working-directory: extension
        run: npm test
