# CI pipeline for Pipelined
# Runs on every push to main and every pull request targeting main.
#
# Recommended branch protection (Settings -> Branches -> main ->
# "Require status checks to pass before merging"):
#   - backend
#   - frontend
#   - extension

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # supercharge/mongodb-github-action is more resilient than a raw
      # services: container, which has been hit by Docker Hub registry
      # "context deadline exceeded" failures.
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: "7.0"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017/pipelined_test
          OPENAI_API_KEY: test-key
          OPENROUTER_API_KEY: test-router-key
          JWT_SECRET: test-secret-for-ci
          DEBUG: "true"
        run: pytest tests/ --tb=short -q

  frontend:
    name: frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-frontend-npm-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (if eslint configured)
        working-directory: frontend
        run: |
          if [ -f ".eslintrc*" ] || [ -f "eslint.config*" ]; then
            npx eslint src/ --max-warnings=0
          else
            echo "ESLint not configured, skipping lint step"
          fi

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test
        working-directory: frontend
        run: npm test -- --reporter=verbose

  extension:
    name: extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: extension/node_modules
          key: ${{ runner.os }}-extension-npm-${{ hashFiles('extension/package-lock.json') }}
          restore-keys: ${{ runner.os }}-extension-npm-

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Run tests
        working-directory: extension
        run: npm test
